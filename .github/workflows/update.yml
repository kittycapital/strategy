name: Update Strategy BTC Data from SEC EDGAR

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
  push:
    paths:
      - 'collect_data.py'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SEC EDGAR data collector
        run: python collect_data.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check for data changes
        id: check_changes
        run: |
          if git diff --quiet strategy_btc_data.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected!"
          fi

      - name: Commit and push updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_btc_data.json strategy_btc_seed.json
          git commit -m "📊 Update Strategy BTC data from SEC EDGAR [$(date -u +%Y-%m-%d)]"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
