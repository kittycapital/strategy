name: Update Strategy BTC Data

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 평일 08:00 UTC (한국 17:00)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape bitbo.io
        run: python collect_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📊 Update Strategy BTC data [$(date -u +%Y-%m-%d)]"
            git pull --rebase
            git push
          fi
