name: Update Strategy BTC Data from SEC EDGAR

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
  push:
    paths:
      - 'collect_data.py'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SEC EDGAR data collector
        run: python collect_data.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update Strategy BTC data [$(date -u +%Y-%m-%d)]"
            git pull --rebase
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
